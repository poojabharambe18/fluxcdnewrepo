apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbs-authentication-microservice-deployment
  namespace: default
  labels:
    app: cbs-authentication-microservice-deployment
spec:
  selector:
    matchLabels:
      app: cbs-authentication-microservice-selector
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      name: cbs-authentication-microservice-pod
      labels:
        app: cbs-authentication-microservice-selector
    spec:
      containers:
      - name: cbs-authentication-microservice-container
        image: acuteinformatics2024/enfinitycore-dev:Enfinity-AuthenticationService-26.01.00.00.03
        imagePullPolicy: IfNotPresent

        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - touch /opt/iamnotready ; sleep 120
              
        # resources:
        #   requests:
        #     cpu: 2Gi
        #     memory: 100Mi
        #   limits:
        #     cpu: 4Gi
        #     memory: 100Mi    
        
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_SERVICE_IP
          value: "$(CBS_AUTHENTICATION_MICROSERVICE_SERVICE_SERVICE_HOST)"
        - name: TZ
          value: "Asia/Calcutta"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: REDIS_PASSWORD
        envFrom:
        - configMapRef:
            name: service-ip-config

        volumeMounts: #bind mount with host
        - mountPath: /opt/API_LOGS/cbs-enfinityAPI-authenticationservice ##mount path from container
          name: apilogs
        - name: tmp-volume
          mountPath: /tmp
      volumes:
        - name: tmp-volume
          hostPath:
            path: /opt/tmp
            type: DirectoryOrCreate
      #          - name: ssl-config
      #            mountPath: /opt/sslCertificate
      #            readOnly: true
        - name: apilogs ##pass the same name as container mount name
          hostPath:
            path: /opt/API_LOGS/cbs-enfinityAPI-AuthenticationService ##path from host machine       #changed
      #        - name: ssl-config
      #          hostPath:
      #            path: /opt/sslCertificate
      imagePullSecrets:
      - name: cbs-enfinity #changed
      terminationGracePeriodSeconds: 150

---

apiVersion: v1
kind: Service
metadata:
  name: cbs-authentication-microservice-service
  namespace: default
spec:
  selector:
    app: cbs-authentication-microservice-selector
  type: ClusterIP
  ports:
  - port: 8081
